services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_APP_NAME: api_store
      DB_URL: jdbc:postgresql://db:5432/inventory_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      DDL: update
    depends_on:
      - db